<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Lab{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Bootstrap CSS 추가 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons 추가 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #f6f7f9;
            --surface: #ffffff;
            --text: #212124;
            --muted: #868b94;
            --line: #eaebee;
            --brand: #ff6f0f;
            --brand-soft: #fff1e8;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .container {
            max-width: 1380px;
            margin: 0 auto;
            padding: 30px 24px 36px;
            width: 100%;
            box-sizing: border-box;
        }
        .site-main {
            flex: 1;
        }
        .content-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 4px 20px rgba(33, 33, 36, 0.05);
        }
        .message-stack {
            display: grid;
            gap: 10px;
            margin-bottom: 14px;
        }
        .message-item {
            padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid #ffd8c2;
            background: var(--brand-soft);
            color: #733b14;
            font-size: 14px;
        }
        .site-header {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
        }
        .header-inner {
            max-width: 1380px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.01em;
        }
        .brand-logo {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--line);
            background: #fff;
        }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 30px;
        }
        .menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            padding: 0;
        }
        .menu-toggle .bar {
            width: 18px;
            height: 2px;
            background: #3a3a3c;
            border-radius: 2px;
            display: block;
            margin: 1.5px 0;
        }
        .menu-overlay {
            display: none;
        }
        .menu-toggle.is-open {
            border-color: transparent;
            background: transparent;
        }
        .menu-toggle.is-open .bar:nth-child(1) {
            transform: translateY(5px) rotate(45deg);
        }
        .menu-toggle.is-open .bar:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.is-open .bar:nth-child(3) {
            transform: translateY(-5px) rotate(-45deg);
        }
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: color .2s ease, background-color .2s ease;
        }
        .nav-link:hover {
            color: var(--text);
            background: #f1f2f4;
        }
        .nav-link.primary {
            color: var(--brand);
            background: var(--brand-soft);
        }
        .nav-link.primary:hover {
            background: #ffe5d6;
            color: #e15900;
        }
        .site-footer {
            margin-top: 20px;
            border-top: 1px solid var(--line);
            background: #ffffff;
            color: var(--muted);
        }
        .footer-inner {
            max-width: 1380px;
            margin: 0 auto;
            padding: 16px 24px;
            font-size: 13px;
        }
        .landing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 20px;
        }
        .landing-card {
            display: block;
            padding: 18px;
            border: 1px solid #ebecef;
            border-radius: 14px;
            background: #fff;
            text-decoration: none;
            color: var(--text);
            transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
        }
        .landing-card:hover {
            transform: translateY(-2px);
            border-color: #ffd0b0;
            box-shadow: 0 10px 22px rgba(255, 111, 15, 0.14);
        }
        .landing-card p {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 14px;
        }
        .hero-kicker {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--brand-soft);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        @media (max-width: 760px) {
            .container {
                padding: 22px 16px 28px;
            }
            .content-card {
                border-radius: 14px;
                padding: 18px;
            }
            .header-inner {
                align-items: center;
            }
            .menu-toggle {
                display: inline-flex;
                position: fixed;
                right: 14px;
                top: 12px;
                z-index: 60;
                width: 44px;
                height: 44px;
                border: none;
                background: transparent;
            }
            .menu-toggle .bar {
                width: 24px;
                height: 2.5px;
                margin: 2.5px 0;
                transition: transform .2s ease, opacity .2s ease;
            }
            .nav-links {
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100vh;
                background: #f3f3f5;
                padding: 90px 26px 32px;
                z-index: 40;
                flex-direction: column;
                align-items: stretch;
                gap: 30px;
                display: flex;
                overflow-y: auto;
                transform: translateY(-8px);
                opacity: 0;
                pointer-events: none;
                transition: transform .22s ease, opacity .22s ease;
            }
            .nav-links.is-open {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }
            .nav-links .nav-link {
                border-radius: 0;
                padding: 3px 0;
                font-size: clamp(38px, 9vw, 55px);
                line-height: 1.07;
                font-weight: 850;
                letter-spacing: -0.045em;
                word-break: keep-all;
                color: #1f2124;
                background: transparent;
            }
            .nav-links .nav-link:hover {
                color: #1f2124;
                background: transparent;
            }
            .nav-links .nav-link.primary {
                color: var(--brand);
                background: transparent;
            }
            .menu-overlay {
                display: none;
            }
        }
    </style>
</head>
<body>
    {% include "components/header.html" %}
    <main class="container site-main">
        {% if messages %}
            <div class="message-stack">
                {% for message in messages %}
                    <div class="message-item">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        <section class="content-card">
            {% block content %}{% endblock %}
        </section>
    </main>
    {% include "components/footer.html" %}
    <!-- Bootstrap JS 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
