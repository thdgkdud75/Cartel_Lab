{% load static %}
<header class="site-header">
    <div class="header-inner">
        <a href="/" class="brand">
            <img src="{% static 'users/teamlab-logo.png' %}" alt="Team Lab Logo" class="brand-logo">
            <span>비전대학교 Lab</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-nav">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <nav class="nav-links" id="site-nav">
            {% with path=request.path %}
            <a href="/users/" class="nav-link{% if path == '/users/' %} primary{% endif %}">인원관리</a>
            <a href="/attendance/" class="nav-link{% if path|slice:':12' == '/attendance/' %} primary{% endif %}">출결관리</a>
            <a href="/planner/" class="nav-link{% if path|slice:':9' == '/planner/' %} primary{% endif %}">목표/계획</a>
            <a href="/jobs/" class="nav-link{% if path|slice:':6' == '/jobs/' %} primary{% endif %}">최근일자리</a>
            <a href="/seats/" class="nav-link{% if path|slice:':7' == '/seats/' %} primary{% endif %}">좌석현황</a>
            {% if request.user.is_authenticated %}
            <a href="/users/" class="nav-link{% if path == '/users/' %} primary{% endif %}">{{ request.user.name }}</a>
            <a href="/users/logout/" class="nav-link">로그아웃</a>
            {% else %}
            <a href="/users/login/" class="nav-link{% if path|slice:':13' == '/users/login/' %} primary{% endif %}">로그인</a>
            {% endif %}
            {% endwith %}
        </nav>
    </div>
</header>
<script>
    (function () {
        var toggle = document.querySelector(".menu-toggle");
        var nav = document.getElementById("site-nav");
        if (!toggle || !nav) return;

        function closeMenu() {
            nav.classList.remove("is-open");
            toggle.classList.remove("is-open");
            toggle.setAttribute("aria-expanded", "false");
            document.body.style.overflow = "";
        }
        toggle.addEventListener("click", function () {
            var open = nav.classList.toggle("is-open");
            toggle.classList.toggle("is-open", open);
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
            document.body.style.overflow = open ? "hidden" : "";
        });

        nav.addEventListener("click", function (event) {
            if (event.target.classList.contains("nav-link")) {
                closeMenu();
            }
        });

        window.addEventListener("resize", function () {
            if (window.innerWidth > 760) {
                closeMenu();
            }
        });
    })();
</script>
