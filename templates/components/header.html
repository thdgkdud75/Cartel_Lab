{% load static %}
<style>
    .user-dropdown {
        position: relative;
    }
    .user-dropdown-trigger {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--muted);
        text-decoration: none;
        padding: 7px 10px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: none;
        border: none;
        transition: color .2s ease, background-color .2s ease;
    }
    .user-dropdown-trigger:hover,
    .user-dropdown.is-open .user-dropdown-trigger {
        color: var(--text);
        background: #f1f2f4;
    }
    .user-dropdown-trigger .chevron {
        width: 14px;
        height: 14px;
        transition: transform .22s ease;
        flex-shrink: 0;
    }
    .user-dropdown.is-open .chevron {
        transform: rotate(180deg);
    }
    .user-dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        min-width: 180px;
        background: #fff;
        border: 1px solid #e2e5e9;
        border-radius: 14px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.10);
        padding: 6px;
        z-index: 100;
        opacity: 0;
        transform: translateY(-8px) scale(0.97);
        pointer-events: none;
        transition: opacity .18s ease, transform .18s ease;
        transform-origin: top right;
    }
    .user-dropdown.is-open .user-dropdown-menu {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
    }
    .user-dropdown-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 10px 12px;
        border-radius: 9px;
        color: #3a3a3c;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: background .15s ease, color .15s ease;
    }
    .user-dropdown-item:hover {
        background: #f5f5f7;
        color: var(--brand);
    }
    .user-dropdown-item svg {
        flex-shrink: 0;
        opacity: .6;
    }
    .user-dropdown-divider {
        height: 1px;
        background: #f0f0f2;
        margin: 4px 0;
    }
    .user-dropdown-item.danger { color: #c2410c; }
    .user-dropdown-item.danger:hover { background: #fff5f0; color: #c2410c; }
    .nav-links > a[href="/attendance/"] { order: 1; }
    .nav-links > a[href="/certifications/"] { order: 2; }
    .nav-links > a[href^="/planner/"] { order: 3; }
    .nav-links > a[href="/seats/"] { order: 4; }
    .nav-links > a[href="/jobs/"] { order: 5; }
    .nav-links > a[href="/quiz/"] { order: 6; }
    .nav-links > a[href="/blog/"] { order: 7; }
    .nav-links > .user-dropdown { order: 99; margin-left: 6px; }

    @media (max-width: 760px) {
        /* 유저 섹션 - 컴팩트 프로필 카드 */
        .user-dropdown {
            width: 100%;
            position: static;
            display: flex;
            flex-direction: column;
            margin-top: auto;
            border-top: 1px solid #e8e9eb;
            padding-top: 16px;
        }
        .user-dropdown-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            background: #fff !important;
            font-size: 15px !important;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #1f2124;
            width: 100%;
            justify-content: flex-start;
            border: 1px solid #e8e9eb;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .user-dropdown-trigger:hover,
        .user-dropdown.is-open .user-dropdown-trigger {
            background: #f7f8fa !important;
            color: #1f2124;
        }
        .user-dropdown-trigger .chevron {
            width: 16px;
            height: 16px;
            margin-left: auto;
        }
        .user-dropdown-trigger img,
        .user-dropdown-trigger span:first-child {
            width: 34px !important;
            height: 34px !important;
            font-size: 14px !important;
        }
        .user-dropdown-menu {
            position: static !important;
            top: auto !important;
            right: auto !important;
            left: auto !important;
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important;
            padding: 6px 0 0 8px;
            opacity: 1 !important;
            transform: none !important;
            pointer-events: auto !important;
            display: none !important;
            min-width: 0 !important;
            width: 100%;
        }
        .user-dropdown.is-open .user-dropdown-menu {
            display: block !important;
        }
        .user-dropdown-item {
            padding: 10px 8px;
            border-radius: 8px;
            background: transparent !important;
            font-size: 14px;
            font-weight: 600;
            color: #3a3a3c;
        }
        .user-dropdown-item:hover {
            background: #f5f5f7 !important;
        }
        .user-dropdown-divider {
            margin: 4px 0;
        }
    }
</style>

<header class="site-header">
    <div class="header-inner">
        <a href="/" class="brand">
            <img src="{% static 'users/teamlab-logo.png' %}" alt="Team Lab Logo" class="brand-logo">
            <span>Jvision Lab</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-nav">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <nav class="nav-links" id="site-nav">
            {% with path=request.path %}
            <a href="/attendance/" class="nav-link{% if path|slice:':12' == '/attendance/' %} primary{% endif %}">출결관리</a>
            <a href="/certifications/" class="nav-link{% if path|slice:':16' == '/certifications/' %} primary{% endif %}">자격증 정보</a>
            <a href="/planner/?view=plan" class="nav-link{% if path|slice:':9' == '/planner/' %} primary{% endif %}">계획/목표</a>
            <a href="/seats/" class="nav-link{% if path|slice:':7' == '/seats/' %} primary{% endif %}">좌석현황</a>
            <a href="/jobs/" class="nav-link{% if path|slice:':6' == '/jobs/' %} primary{% endif %}">최신일자리</a>
            <a href="/quiz/" class="nav-link{% if path|slice:':6' == '/quiz/' %} primary{% endif %}">Today Code</a>
            <a href="/blog/" class="nav-link{% if path|slice:':6' == '/blog/' %} primary{% endif %}">기술블로그</a>
            {% if request.user.is_authenticated %}
            <div class="user-dropdown" id="userDropdown">
                <button class="user-dropdown-trigger" type="button" aria-expanded="false" aria-haspopup="true">
                    {% if request.user.profile_image %}
                    <img src="{{ request.user.profile_image.url }}" alt="프로필" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid #e2e5e9;">
                    {% else %}
                    <span style="width:26px;height:26px;border-radius:50%;background:#dbeafe;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1d4ed8;flex-shrink:0;">{{ request.user.name|slice:":1" }}</span>
                    {% endif %}
                    {{ request.user.name }}
                    <svg class="chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="user-dropdown-menu" role="menu">
                    {% if request.user.is_staff %}
                    <a href="/auth/admin/" class="user-dropdown-item" role="menuitem">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        관리자 대시보드
                    </a>
                    <div class="user-dropdown-divider"></div>
                    {% endif %}
                    <a href="/users/edit/" class="user-dropdown-item" role="menuitem">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        내 정보 변경
                    </a>
                    <a href="/users/" class="user-dropdown-item" role="menuitem">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                        내 정보 및 이력서 분석
                    </a>
                    <div class="user-dropdown-divider"></div>
                    <a href="/users/logout/" class="user-dropdown-item danger" role="menuitem">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        로그아웃
                    </a>
                </div>
            </div>
            {% else %}
            <a href="/users/login/" class="nav-link{% if path|slice:':13' == '/users/login/' %} primary{% endif %}">로그인</a>
            {% endif %}
            {% endwith %}
        </nav>
    </div>
</header>
<script>
    (function () {
        var toggle = document.querySelector(".menu-toggle");
        var nav = document.getElementById("site-nav");
        var dropdown = document.getElementById("userDropdown");
        var trigger = dropdown ? dropdown.querySelector(".user-dropdown-trigger") : null;
        var leaveTimer = null;

        // 햄버거 메뉴
        if (toggle && nav) {
            function closeMenu() {
                nav.classList.remove("is-open");
                toggle.classList.remove("is-open");
                toggle.setAttribute("aria-expanded", "false");
                document.body.style.overflow = "";
            }
            toggle.addEventListener("click", function () {
                var open = nav.classList.toggle("is-open");
                toggle.classList.toggle("is-open", open);
                toggle.setAttribute("aria-expanded", open ? "true" : "false");
                document.body.style.overflow = open ? "hidden" : "";
            });
            nav.addEventListener("click", function (e) {
                if (e.target.classList.contains("nav-link")) closeMenu();
            });
            window.addEventListener("resize", function () {
                if (window.innerWidth > 760) closeMenu();
            });
        }

        // 드롭다운
        if (dropdown && trigger) {
            function openDropdown() {
                clearTimeout(leaveTimer);
                dropdown.classList.add("is-open");
                trigger.setAttribute("aria-expanded", "true");
            }
            function closeDropdown() {
                dropdown.classList.remove("is-open");
                trigger.setAttribute("aria-expanded", "false");
            }
            function scheduleClose() {
                leaveTimer = setTimeout(closeDropdown, 120);
            }

            // 호버 (데스크탑)
            dropdown.addEventListener("mouseenter", openDropdown);
            dropdown.addEventListener("mouseleave", scheduleClose);

            // 클릭 (모바일 / 접근성)
            trigger.addEventListener("click", function (e) {
                e.stopPropagation();
                if (dropdown.classList.contains("is-open")) {
                    closeDropdown();
                } else {
                    openDropdown();
                }
            });

            // 외부 클릭 시 닫기
            document.addEventListener("click", function (e) {
                if (!dropdown.contains(e.target)) closeDropdown();
            });

            // 메뉴 아이템 클릭 시 닫기
            dropdown.querySelectorAll(".user-dropdown-item").forEach(function (item) {
                item.addEventListener("click", closeDropdown);
            });
        }
    })();
</script>
