<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Lab{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f7f8fa;
            color: #111827;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 24px 16px;
            width: 100%;
            box-sizing: border-box;
        }
        .content-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    {% include "components/header.html" %}
    <main class="container" style="flex:1;">
        {% if messages %}
            <div style="display:grid; gap:8px; margin-bottom:12px;">
                {% for message in messages %}
                    <div style="padding:10px 12px; border-radius:8px; border:1px solid #d1d5db; background:#f9fafb;">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        <section class="content-card">
            {% block content %}{% endblock %}
        </section>
    </main>
    {% include "components/footer.html" %}
</body>
</html>
